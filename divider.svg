<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 20" width="100%" height="20" style="background: transparent;">
  <defs>
    <!-- Cyan-to-Purple Gradient for pulse -->
    <linearGradient id="div-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="rgba(163, 113, 247, 0.1)" />
      <stop offset="30%" stop-color="#a371f7" />
      <stop offset="50%" stop-color="#00f2fe" />
      <stop offset="70%" stop-color="#db61a2" />
      <stop offset="100%" stop-color="rgba(219, 97, 162, 0.1)" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow-div" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    @keyframes laser-move {
      0% {
        stroke-dashoffset: 1600;
      }
      100% {
        stroke-dashoffset: 0;
      }
    }

    .base-line {
      stroke: #1b1d2a;
      stroke-width: 1;
      opacity: 0.6;
    }

    .laser-pulse {
      stroke: url(#div-grad);
      stroke-width: 2;
      stroke-dasharray: 200 600;
      stroke-dashoffset: 1600;
      animation: laser-move 4s linear infinite;
      filter: url(#glow-div);
    }
  </style>

  <!-- Base Line -->
  <line x1="0" y1="10" x2="800" y2="10" class="base-line" />
  
  <!-- Laser Pulse Line -->
  <line x1="0" y1="10" x2="800" y2="10" class="laser-pulse" />
  
  <!-- Decorative center point -->
  <circle cx="400" cy="10" r="3" fill="#00f2fe" filter="url(#glow-div)" />
</svg>
