<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="100%" height="300" style="background: #08090f; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#05060b" />
      <stop offset="50%" stop-color="#0b0c13" />
      <stop offset="100%" stop-color="#030305" />
    </linearGradient>

    <!-- Glowing Violet-Magenta Gradient -->
    <linearGradient id="glow-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#a371f7" />
      <stop offset="50%" stop-color="#e25c9b" />
      <stop offset="100%" stop-color="#803fe7" />
    </linearGradient>

    <!-- Cyan-Blue Gradient -->
    <linearGradient id="cyber-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>

    <!-- Subtle Glow for Accents -->
    <filter id="subtle-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    /* CSS Animations */
    @keyframes pulse-glow {
      0%, 100% { opacity: 0.9; filter: drop-shadow(0 0 4px rgba(163, 113, 247, 0.5)); }
      50% { opacity: 1; filter: drop-shadow(0 0 12px rgba(226, 92, 155, 0.8)); }
    }
    
    @keyframes grid-move {
      0% { transform: translateY(0); }
      100% { transform: translateY(30px); }
    }

    @keyframes float-particle {
      0%, 100% { transform: translateY(0px) translateX(0px); opacity: 0.2; }
      50% { transform: translateY(-10px) translateX(5px); opacity: 0.6; }
    }

    @keyframes float-particle-reverse {
      0%, 100% { transform: translateY(0px) translateX(0px); opacity: 0.3; }
      50% { transform: translateY(10px) translateX(-5px); opacity: 0.7; }
    }

    @keyframes draw-dash {
      to {
        stroke-dashoffset: 0;
      }
    }

    @keyframes pulse-dot {
      0%, 100% { r: 2px; opacity: 0.4; }
      50% { r: 3.5px; opacity: 0.8; }
    }

    /* Classes */
    .bg-rect {
      fill: url(#bg-grad);
    }

    .grid-lines {
      stroke: #161824;
      stroke-width: 0.5;
      opacity: 0.4;
    }

    .moving-grid {
      animation: grid-move 10s linear infinite;
    }

    .glow-title {
      font-size: 54px;
      font-weight: 800;
      letter-spacing: 6px;
      fill: none;
      stroke: url(#glow-grad);
      stroke-width: 2;
      stroke-dasharray: 1000;
      stroke-dashoffset: 1000;
      animation: draw-dash 3.5s ease-out forwards, pulse-glow 3s ease-in-out infinite 3.5s;
    }

    .title-fill {
      font-size: 54px;
      font-weight: 800;
      letter-spacing: 6px;
      fill: url(#glow-grad);
      opacity: 0;
      animation: fade-in 1.5s ease-out forwards 2.5s;
    }

    @keyframes fade-in {
      to { opacity: 1; }
    }

    .glow-sub {
      font-size: 14px;
      font-weight: 600;
      fill: url(#cyber-grad);
      letter-spacing: 4px;
      opacity: 0;
      animation: fade-in 2s ease-out forwards 1.8s;
    }

    .particle-1 { animation: float-particle 7s ease-in-out infinite; }
    .particle-2 { animation: float-particle-reverse 9s ease-in-out infinite; }
    .particle-3 { animation: float-particle 6s ease-in-out infinite 1s; }
    
    .tech-pill {
      font-size: 11px;
      fill: #546086;
      font-family: monospace;
      letter-spacing: 2px;
      opacity: 0.85;
    }

    .corner-line {
      stroke: #a371f7;
      stroke-width: 1.5;
      fill: none;
      opacity: 0.5;
      filter: url(#subtle-glow);
    }
  </style>

  <!-- Background -->
  <rect width="800" height="300" class="bg-rect" />

  <!-- Grid Backing -->
  <g class="moving-grid">
    <line x1="0" y1="15" x2="800" y2="15" class="grid-lines" />
    <line x1="0" y1="45" x2="800" y2="45" class="grid-lines" />
    <line x1="0" y1="75" x2="800" y2="75" class="grid-lines" />
    <line x1="0" y1="105" x2="800" y2="105" class="grid-lines" />
    <line x1="0" y1="135" x2="800" y2="135" class="grid-lines" />
    <line x1="0" y1="165" x2="800" y2="165" class="grid-lines" />
    <line x1="0" y1="195" x2="800" y2="195" class="grid-lines" />
    <line x1="0" y1="225" x2="800" y2="225" class="grid-lines" />
    <line x1="0" y1="255" x2="800" y2="255" class="grid-lines" />
    <line x1="0" y1="285" x2="800" y2="285" class="grid-lines" />
  </g>

  <!-- Converging perspective lines (Subtle) -->
  <g opacity="0.15">
    <line x1="200" y1="0" x2="-100" y2="300" class="grid-lines" />
    <line x1="300" y1="0" x2="150" y2="300" class="grid-lines" />
    <line x1="400" y1="0" x2="400" y2="300" class="grid-lines" />
    <line x1="500" y1="0" x2="650" y2="300" class="grid-lines" />
    <line x1="600" y1="0" x2="900" y2="300" class="grid-lines" />
  </g>

  <!-- Glowing Particles -->
  <circle cx="120" cy="70" r="2.5" fill="#a371f7" filter="url(#subtle-glow)" class="particle-1" />
  <circle cx="690" cy="80" r="3" fill="#db61a2" filter="url(#subtle-glow)" class="particle-2" />
  <circle cx="180" cy="230" r="2" fill="#00f2fe" filter="url(#subtle-glow)" class="particle-3" />
  <circle cx="630" cy="210" r="3" fill="#a371f7" filter="url(#subtle-glow)" class="particle-1" />
  <circle cx="90" cy="190" r="2" fill="#db61a2" filter="url(#subtle-glow)" class="particle-2" />

  <!-- Sleek Frame Elements -->
  <path d="M 15,35 L 15,15 L 35,15" class="corner-line" />
  <path d="M 785,35 L 785,15 L 765,15" class="corner-line" />
  <path d="M 15,265 L 15,285 L 35,285" class="corner-line" />
  <path d="M 785,265 L 785,285 L 765,285" class="corner-line" />

  <!-- Center divider lines -->
  <line x1="300" y1="205" x2="500" y2="205" stroke="#1b1d2a" stroke-width="1" />
  <line x1="370" y1="205" x2="430" y2="205" stroke="url(#cyber-grad)" stroke-width="1.5" filter="url(#subtle-glow)" />

  <!-- Central Header Text -->
  <g transform="translate(400, 140)" text-anchor="middle">
    <!-- Glow Backing -->
    <text y="0" class="glow-title" filter="url(#glow)">ANSH9BOSS</text>
    <!-- Main Fill Text -->
    <text y="0" class="title-fill">ANSH9BOSS</text>
    
    <!-- Subtitle -->
    <text y="42" class="glow-sub">OVERALL DEVELOPER &amp; SYSTEMS ENGINEER</text>
  </g>

  <!-- Technical Tags at the Bottom -->
  <g transform="translate(400, 245)" text-anchor="middle" class="tech-pill">
    <text>SECURITY • VIRTUALIZATION • AI SYSTEMS • MINECRAFT MODS</text>
  </g>
</svg>
